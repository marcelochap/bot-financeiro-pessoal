# Financeiro n8n para VPS multi-projeto: sem Caddy proprio, rede compartilhada "web",
# rota declarada por labels (caddy-docker-proxy roteia por subdominio).
services:
  n8n:
    build:
      context: .
      args:
        N8N_VERSION: ${N8N_VERSION:?pinne a versao do n8n no .env}
    image: financeiro-n8n:prod
    container_name: financeiro-n8n
    restart: unless-stopped
    expose:
      - "5678"
    environment:
      - N8N_HOST=${DOMAIN:?defina DOMAIN no .env}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:?defina N8N_ENCRYPTION_KEY no .env}
      - WEBHOOK_URL=https://${DOMAIN}/
      - GENERIC_TIMEZONE=${TZ:-America/Sao_Paulo}
      - TZ=${TZ:-America/Sao_Paulo}
      - N8N_RUNNERS_ENABLED=true
      - N8N_PROXY_HOPS=1
      - N8N_SECURE_COOKIE=true
      - N8N_RESTRICT_FILE_ACCESS_TO=/data/csv
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:?defina TELEGRAM_WEBHOOK_SECRET no .env}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - NODE_FUNCTION_ALLOW_BUILTIN=child_process,fs,path
      - N8N_CORS_ALLOWED_ORIGINS=${N8N_CORS_ALLOWED_ORIGINS:-https://${DOMAIN}}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash-preview}
      - C6_ZIP_PASSWORD=${C6_ZIP_PASSWORD}
      - GOOGLE_SHEETS_ID=${GOOGLE_SHEETS_ID}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - DASHBOARD_URL=${DASHBOARD_URL}
      # --- Bot Financeiro da Harumi (mesma instância n8n, workflows separados em
      # workflows-harumi/, credencial de Telegram própria "Telegram Bot (Harumi)") ---
      - TELEGRAM_BOT_TOKEN_HARUMI=${TELEGRAM_BOT_TOKEN_HARUMI}
      - TELEGRAM_CHAT_ID_HARUMI=${TELEGRAM_CHAT_ID_HARUMI}
      - C6_ZIP_PASSWORD_HARUMI=${C6_ZIP_PASSWORD_HARUMI}
      - NOTION_TOKEN=${NOTION_TOKEN}
      - NOTION_VERSION=${NOTION_VERSION:-2022-06-28}
      - NOTION_DB_LANCAMENTOS=${NOTION_DB_LANCAMENTOS}
      - NOTION_DB_DICIONARIO=${NOTION_DB_DICIONARIO}
      - NOTION_DB_CATEGORIAS=${NOTION_DB_CATEGORIAS}
      - NOTION_DB_CONFIG=${NOTION_DB_CONFIG}
      - NOTION_DB_LOG=${NOTION_DB_LOG}
      - NOTION_DB_METAS=${NOTION_DB_METAS}
      - NOTION_DB_CONTAS_FIXAS=${NOTION_DB_CONTAS_FIXAS}
      - NOTION_DB_DASHBOARD_MENSAL=${NOTION_DB_DASHBOARD_MENSAL}
      - NOTION_DB_FATURA_ABERTA=${NOTION_DB_FATURA_ABERTA}
      - NOTION_DB_PARCELAS=${NOTION_DB_PARCELAS}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows
      - ./workflows-harumi:/workflows-harumi
      - "./Dados CSV:/data/csv:ro"
    networks:
      - web
    labels:
      caddy: financeiro.minhaautomacao.cloud
      caddy.reverse_proxy: "{{upstreams 5678}}"

  dashboard:
    build:
      context: ./dashboard-web
    image: financeiro-dashboard:prod
    container_name: financeiro-dashboard
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - web
    labels:
      caddy: financeiro.minhaautomacao.cloud
      caddy.handle_path: /dashboard*
      caddy.handle_path.reverse_proxy: "{{upstreams 80}}"

networks:
  web:
    external: true

volumes:
  n8n_data:
