# Bot Financeiro Doméstico — n8n self-hosted + ngrok
#
# Uso:
#   docker compose up -d                      → sobe só o n8n (local)
#   docker compose --profile tunnel up -d     → sobe n8n + túnel ngrok (webhooks Telegram)
#
# Todas as credenciais vêm do .env (copie .env.example → .env e preencha).

services:
  n8n:
    build:
      context: .
      args:
        N8N_VERSION: ${N8N_VERSION:-latest}
    image: financeiro-n8n:local
    container_name: financeiro-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      # --- n8n core ---
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:?defina N8N_ENCRYPTION_KEY no .env}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=${TZ:-America/Sao_Paulo}
      - TZ=${TZ:-America/Sao_Paulo}
      - N8N_RUNNERS_ENABLED=true
      # Read/Write File: amostras de CSV para os workflows de teste
      - N8N_RESTRICT_FILE_ACCESS_TO=/data/csv
      # Roteador valida o secret do webhook do Telegram (vazio = check desligado, só dev)
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
      # Workflows leem GOOGLE_SHEETS_ID/TELEGRAM_CHAT_ID via $env nas expressões
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # Roteador descompacta ZIP do C6 no Code node (7z via execFile — o nó
      # Execute Command foi removido do n8n 2.x)
      - NODE_FUNCTION_ALLOW_BUILTIN=child_process,fs,path
      # --- credenciais da aplicação (acessíveis nos workflows via $env) ---
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash-preview}
      - C6_ZIP_PASSWORD=${C6_ZIP_PASSWORD}
      - GOOGLE_SHEETS_ID=${GOOGLE_SHEETS_ID}
    volumes:
      # Volume persistente: workflows e credenciais sobrevivem a restart/recreate
      - n8n_data:/home/node/.n8n
      # Export/import de workflows versionados no repositório
      - ./workflows:/workflows
      # Amostras de CSV do C6 para testes (somente leitura)
      - "./Dados CSV:/data/csv:ro"

  # Túnel ngrok para expor webhooks do Telegram (perfil opcional "tunnel").
  # DEV: túnel EFÊMERO (URL aleatória) — não toca no domínio reservado da produção.
  # A cada subida do túnel, rodar scripts/atualizar-webhook-ngrok.ps1 para
  # gravar a URL nova em WEBHOOK_URL e recriar o n8n.
  ngrok:
    image: ngrok/ngrok:latest
    container_name: financeiro-ngrok
    restart: unless-stopped
    profiles: ["tunnel"]
    command: ["http", "n8n:5678"]
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040" # inspetor web do ngrok
    depends_on:
      - n8n

volumes:
  n8n_data:
